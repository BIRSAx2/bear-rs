name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cargo fmt
        run: cargo fmt --all --check
      - name: Cargo test
        run: cargo test
      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
